    const graph = {};

    function addEdge(u, v, w) {
      if (!graph[u]) graph[u] = {};
      if (!graph[v]) graph[v] = {};
      graph[u][v] = w;
      graph[v][u] = w;
    }

    function loadGraphFromCsv(csv) {
      const lines = csv.split(/\r?\n/);
      for (let i = 1; i < lines.length; i++) { // skip header
        const row = lines[i].split(",");
        const a = row[0].trim();
        const b = row[1].trim();
        const w = Number(row[2].trim());
        if (!a || !b || !Number.isFinite(w)) continue;
        addEdge(a, b, w);
      }
    }

    loadGraphFromCsv(csvData);
    console.log("graph[\"27\"] =", graph["27"]);
    console.log("graph[\"23\"] =", graph["23"]);

    function dijkstra(start, end) {
      const distances = {};
      const previous = {};
      const visited = new Set();

      Object.keys(graph).forEach(node => {
        distances[node] = Infinity;
        previous[node] = null;
      });

      if (!graph[start] || !graph[end]) {
        return { path: [], distance: Infinity };
      }

      distances[start] = 0;

      while (true) {
        let current = null;
        let currentDist = Infinity;

        for (const node of Object.keys(graph)) {
          if (!visited.has(node) && distances[node] < currentDist) {
            currentDist = distances[node];
            current = node;
          }
        }

        if (current === null) break;
        if (current === end) break;

        visited.add(current);

        for (const neighbor in graph[current]) {
          const weight = graph[current][neighbor];
          const newDist = distances[current] + weight;
          if (newDist < distances[neighbor]) {
            distances[neighbor] = newDist;
            previous[neighbor] = current;
          }
        }
      }

      if (distances[end] === Infinity) {
        return { path: [], distance: Infinity };
      }

      const path = [];
      let node = end;
      while (node !== null) {
        path.unshift(node);
        node = previous[node];
      }

      return { path, distance: distances[end] };
    }

    function run() {
      const start = prompt("Enter start node (e.g. 1, 27, A, L1_4):");
      if (start === null) return;
      const end = prompt("Enter end node (e.g. 24, 23, C, L1_13):");
      if (end === null) return;

      const s = start.trim();
      const e = end.trim();

      const result = dijkstra(s, e);
      const outEl = document.getElementById("output");

      if (result.distance === Infinity || result.path.length === 0) {
        outEl.textContent = "No path found between " + s + " and " + e;
      } else {
        outEl.textContent =
          "Shortest path from " + s + " to " + e + ":\n" +
          result.path.join(" -> ") +
          "\nTotal distance: " + result.distance;
      }

      console.log(result);
    }
